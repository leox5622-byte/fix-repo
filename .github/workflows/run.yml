name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npx eslint . --ext .js
      continue-on-error: true  # Optional: continue even if lint fails

    - name: Run tests
      run: npm test
      continue-on-error: true  # If no tests, skip

    # Add deployment steps here if needed, e.g., to a server or cloud platform